services:
  # --- 服务 A: ArchRAG 核心应用 (保持不变) ---
  archrag-app:
    build: .
    container_name: archrag-core
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - NEO4J_USER=${NEO4J_USERNAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - NEO4J_URI=bolt://neo4j-db:7687
      - NEO4J_DATABASE=${NEO4J_DATABASE}
      - ARCHRAG_BASE_DIR=/app
    volumes:
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
      - ./jsonl:/app/jsonl
      - ./graph:/app/graph
      - ./monitor:/app/monitor
      - ./rag:/app/rag
      - ./core:/app/core
      - ./config.py:/app/config.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - neo4j-db
    restart: unless-stopped

  # --- 服务 B: Neo4j 图数据库 (修改这里！) ---
  neo4j-db:
    image: neo4j:5.15.0
    container_name: archrag-neo4j
    ports:
      - "7474:7474" 
      - "7687:7687" 
    # ❌ 删除下面这两行！不要让 Neo4j 读到 NEO4J_USERNAME 这个变量
    # env_file:
    #   - .env
    environment:
      # Docker Compose 会在宿主机读取 .env 填入这里，这是安全的
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
      - ./neo4j_data/import:/var/lib/neo4j/import
      - ./neo4j_data/plugins:/plugins
    restart: unless-stopped